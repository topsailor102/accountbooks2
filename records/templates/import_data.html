{% extends "base_template.html" %}

{% block content %}
<div class="glass-card" style="max-width: 600px; margin: 2rem auto;">
    <h2 class="page-title mb-2">Import Data</h2>
    <p class="page-subtitle">Upload your CSV file to batch import historical expenses.</p>
    
    <div style="background-color:rgba(59, 130, 246, 0.05); border:1px dashed var(--info); padding:1.5rem; border-radius:var(--radius-md); margin-bottom:2rem; text-align:center;">
        <i class="fas fa-cloud-upload-alt fa-3x" style="color:var(--info); margin-bottom:1rem;"></i>
        <p style="font-size:0.875rem; color:var(--text-main);">Drag and drop a file here or browse</p>
    </div>

    <form action="" method="post" enctype="multipart/form-data" class="modern-form">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
            </div>
        {% endfor %}
        <div style="margin-top:2rem; text-align:right;">
            <button type="submit" class="btn btn-primary"><i class="fas fa-file-import" style="margin-right:0.5rem;"></i> Upload & Import</button>
        </div>
    </form>
</div>
{% endblock %}
